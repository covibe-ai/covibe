# Covibe 部署文档
# ==================
# 使用方式:
#   开发: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up
#   生产: docker compose -f deploy/docker-compose.yml up -d
#
# 未来扩展: 
#   happy-server 可通过 Redis pub/sub 水平扩展
#   covibe-server 无状态，加 -replicas 即可
#   PostgreSQL 读写分离 + PgBouncer

services:
  # ─── 数据库 ───
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: &db_user covibe
      POSTGRES_PASSWORD: &db_pass ${DB_PASSWORD:-covibe}
      POSTGRES_DB: &db_name covibe
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covibe"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - covibe-net

  # ─── 缓存 / 消息队列 ───
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - covibe-net

  # ─── Happy Server (Session + Socket.IO) ───
  happy-server:
    build:
      context: ../covibe-happy
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: "postgresql://covibe:${DB_PASSWORD:-covibe}@db:5432/covibe"
      HANDY_MASTER_SECRET: ${HANDY_MASTER_SECRET:?required}
      PORT: "3005"
      REDIS_URL: "redis://redis:6379/0"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - happy-data:/data
    restart: unless-stopped
    networks:
      - covibe-net
    # 依赖 Redis pub/sub 做 Socket.IO 集群

  # ─── Covibe Server (Django API + Admin) ───
  covibe-server:
    build:
      context: ../covibe-server
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: covibe
      DB_USER: covibe
      DB_PASSWORD: "${DB_PASSWORD:-covibe}"
      REDIS_URL: "redis://redis:6379/0"
      HAPPY_SERVER_URL: "http://happy-server:3005"
      HANDY_MASTER_SECRET: ${HANDY_MASTER_SECRET:?required}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?required}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,api.covibe.ai}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://covibe.ai,https://dashboard.covibe.ai}
      DJANGO_SUPERUSER_CREATE: "true"
      SUPERUSER_USERNAME: root
      SUPERUSER_EMAIL: "${SUPERUSER_EMAIL:-***}"
      SUPERUSER_PASSWORD: ${ROOT_PASSWORD:?required}
      DAPHNE_PORT: "8080"
      NGINX_PORT: "80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server-media:/app/media
      - server-static:/app/static_collected
    restart: unless-stopped
    networks:
      - covibe-net
    # 水平扩展：无状态，加 replicas 即可
    # db 连接池需调整：PGPOOL_SIZE * replicas 不超过 PG max_connections

  # ─── Celery Worker ───
  covibe-worker:
    build:
      context: ../covibe-server
    command: ["celery", "worker"]
    environment:
      DB_HOST: db
      DB_NAME: covibe
      DB_USER: covibe
      DB_PASSWORD: "${DB_PASSWORD:-covibe}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_CONCURRENCY: "4"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - covibe-net

  # ─── Celery Beat (定时任务) ───
  covibe-beat:
    build:
      context: ../covibe-server
    command: ["celery", "beat"]
    environment:
      DB_HOST: db
      DB_NAME: covibe
      DB_USER: covibe
      DB_PASSWORD: "${DB_PASSWORD:-covibe}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - covibe-net

volumes:
  pgdata:
  redis-data:
  happy-data:
  server-media:
  server-static:

networks:
  covibe-net:
    driver: bridge
